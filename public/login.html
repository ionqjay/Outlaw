<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShopMyRepair</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .auth-wrap{max-width:680px;margin:40px auto;padding:20px}
    .card{background:#15151a;border:1px solid #2a2a31;border-radius:14px;padding:18px}
    .grid{display:grid;gap:10px}
    input,select{padding:11px;border-radius:10px;border:1px solid #333;background:#0f0f13;color:#fff}
  </style>
</head>
<body>
  <nav class="nav"><div class="logo"><span>SHOPMY</span><span class="orange">REPAIR</span></div></nav>
  <main class="auth-wrap">
    <h1>Sign in / Sign up</h1>
    <div class="card grid">
      <select id="role"><option value="owner">Car Owner</option><option value="mechanic">Mechanic / Shop</option></select>
      <input id="name" placeholder="Full name (for sign up)" />
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <div style="display:flex;gap:8px">
        <button class="btn btn-dark" id="signInBtn" type="button">Sign In</button>
        <button class="btn btn-orange" id="signUpBtn" type="button">Sign Up</button>
      </div>
      <p id="authStatus" class="sub"></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
